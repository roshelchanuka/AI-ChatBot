<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TravelBot Templates</title>
    <!-- Styles moved inside form markers -->
    <!-- START: login-form -->
    <style>
        .auth-form {
            display: flex; flex-direction: column; gap: 10px; background-color: #ffffff; padding: 30px;
            width: 100%; max-width: 450px; border-radius: 20px; font-family: sans-serif; margin: auto; color: #151717;
        }
        .flex-column > label { color: #151717; font-weight: 600; }
        .auth-inputForm {
            border: 1.5px solid #ecedec; border-radius: 10px; height: 50px; display: flex;
            align-items: center; padding-left: 10px; transition: 0.2s ease-in-out; background: white;
        }
        .auth-input { margin-left: 10px; border: none; width: 100%; height: 100%; background: transparent; color: black; outline: none; }
        .auth-inputForm:focus-within { border: 1.5px solid #2d79f3; }
        .flex-row { display: flex; align-items: center; gap: 10px; justify-content: space-between; }
        .auth-button-submit {
            margin: 20px 0 10px 0; background-color: #151717; border: none; color: white;
            font-size: 15px; font-weight: 500; border-radius: 10px; height: 50px; width: 100%; cursor: pointer;
        }
        .p { text-align: center; color: black; font-size: 14px; margin: 5px 0; }
        .auth-btn {
            margin-top: 10px; width: 100%; height: 50px; border-radius: 10px; display: flex;
            justify-content: center; align-items: center; font-weight: 500; gap: 10px; border: 1px solid #ededef;
            background-color: white; cursor: pointer; color: #151717;
        }
        .line { position: relative; margin: 15px 0; text-align: center; }
        .line::before, .line::after { content: ""; position: absolute; top: 50%; width: 35%; height: 1px; background: #ecedec; }
        .line::before { left: 0; } .line::after { right: 0; }
    </style>
    <form class="auth-form" method="GET" target="_top" id="login-form">
        <input type="hidden" name="action" value="login">
        <div class="flex-column"><label>Email </label></div>
        <div class="auth-inputForm">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" viewBox="0 0 32 32" height="20"><g data-name="Layer 3" id="Layer_3"><path d="m30.853 13.87a15 15 0 0 0 -29.729 4.082 15.1 15.1 0 0 0 12.876 12.918 15.6 15.6 0 0 0 2.016.13 14.85 14.85 0 0 0 7.715-2.145 1 1 0 1 0 -1.031-1.711 13.007 13.007 0 1 1 5.458-6.529 2.149 2.149 0 0 1 -4.158-.759v-10.856a1 1 0 0 0 -2 0v1.726a8 8 0 1 0 .2 10.325 4.135 4.135 0 0 0 7.83.274 15.2 15.2 0 0 0 .823-7.455zm-14.853 8.13a6 6 0 1 1 6-6 6.006 6.006 0 0 1 -6 6z"></path></g></svg>
            <input name="email" placeholder="Enter your Email" class="auth-input" type="text" required>
        </div>
        <div class="flex-column"><label>Password </label></div>
        <div class="auth-inputForm">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" viewBox="-64 0 512 512" height="20"><path d="m336 512h-288c-26.453125 0-48-21.523438-48-48v-224c0-26.476562 21.546875-48 48-48h288c26.453125 0 48 21.523438 48 48v224c0 26.476562-21.546875 48-48 48zm-288-288c-8.8125 0-16 7.167969-16 16v224c0 8.832031 7.1875 16 16 16h288c8.8125 0 16-7.167969 16-16v-224c0-8.832031-7.1875-16-16-16zm0 0"></path><path d="m304 224c-8.832031 0-16-7.167969-16-16v-80c0-52.929688-43.070312-96-96-96s-96 43.070312-96 96v80c0 8.832031-7.167969 16-16 16s-16-7.167969-16-16v-80c0-70.59375 57.40625-128 128-128s128 57.40625 128 128v80c0 8.832031-7.167969 16-16 16zm0 0"></path></svg>
            <input name="pass" placeholder="Enter your Password" class="auth-input" type="password" required>
        </div>
        <button class="auth-button-submit" type="submit">Sign In</button>
        <p class="p line">Or With</p>
        <div class="flex-row">
            <button class="auth-btn google" type="button">Google</button>
            <button class="auth-btn apple" type="button">Apple</button>
        </div>
    </form>
    <script>
        (function() {
            try {
                const parentUrl = window.top.location.origin + window.top.location.pathname;
                document.getElementById('login-form').action = parentUrl;
            } catch (e) {
                document.getElementById('login-form').action = "/";
            }
        })();
    </script>
    <!-- END: login-form -->

</body>
